version: 2

models:
  - name: mart_sales_analytics
    description: >
      Aggregated sales analytics mart at the (order_date, fiscal_quarter, channel,
      category, price_tier) grain. Reports revenue, units, margin, and discount
      metrics. Primary consumption layer for sales dashboards.
    meta:
      freshness:
        loaded_at_field: order_date
        warn_after: {count: 1, period: day}
        error_after: {count: 3, period: day}
    columns:
      - name: order_date
        description: "Calendar date of aggregated orders."
        data_type: date
        data_tests:
          - not_null
      - name: fiscal_quarter
        description: "Fiscal quarter label (FY start = February)."
        data_type: varchar
        data_tests:
          - not_null
      - name: channel
        description: "Sales channel."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [test, fail] # [web, mobile, store]
      - name: category
        description: "Product category."
        data_type: varchar
      - name: price_tier
        description: "Product price tier (low, mid, high)."
        data_type: varchar
        data_tests:
          - accepted_values:
              arguments:
                values: [low, mid, high]
      - name: orders
        description: "Count of distinct orders in this group."
        data_type: bigint
        data_tests:
          - not_null
      - name: units_sold
        description: "Total units sold."
        data_type: bigint
        data_tests:
          - not_null
      - name: gross_revenue
        description: "Total revenue before discounts in USD."
        data_type: double
        data_tests:
          - not_null
      - name: net_revenue
        description: "Total revenue after discounts in USD."
        data_type: double
        data_tests:
          - not_null
      - name: gross_margin_dollars
        description: "Net revenue minus total product cost."
        data_type: double
      - name: gross_margin_pct
        description: "Gross margin as a fraction of net revenue (0–1)."
        data_type: double
      - name: avg_discount_pct
        description: "Average discount as a fraction of gross revenue (0–1)."
        data_type: double

  - name: mart_inventory
    description: >
      Inventory status mart joining movement history with product dimensions.
      Includes stockout risk flags and days-of-cover estimates. One row per
      (snapshot_date, store_id, product_id).
    meta:
      freshness:
        loaded_at_field: snapshot_date
        warn_after: {count: 32, period: day}
        error_after: {count: 62, period: day}
    columns:
      - name: snapshot_date
        description: "Date of the inventory snapshot."
        data_type: date
        data_tests:
          - not_null
      - name: store_id
        description: "Store location."
        data_type: varchar
        data_tests:
          - not_null
      - name: product_id
        description: "Product being tracked."
        data_type: varchar
        data_tests:
          - not_null
      - name: product_name
        description: "Human-readable product name."
        data_type: varchar
      - name: category
        description: "Product category."
        data_type: varchar
      - name: price_tier
        description: "Product price tier."
        data_type: varchar
        data_tests:
          - accepted_values:
              arguments:
                values: [low, mid, high]
      - name: on_hand_units
        description: "Units physically in stock."
        data_type: integer
        data_tests:
          - not_null
      - name: reorder_point
        description: "Level at which a reorder should be triggered."
        data_type: integer
        data_tests:
          - not_null
      - name: safety_stock
        description: "Minimum buffer stock to maintain."
        data_type: integer
        data_tests:
          - not_null
      - name: is_below_reorder
        description: "True when on_hand_units is below the reorder point."
        data_type: boolean
        data_tests:
          - not_null
      - name: stockout_risk_flag
        description: "True when on_hand_units is at or below safety_stock."
        data_type: boolean
        data_tests:
          - not_null
      - name: unit_delta
        description: "Change in on_hand_units since the prior snapshot."
        data_type: integer
        data_tests:
          - not_null
      - name: movement_type
        description: "Direction of inventory change since last snapshot."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [initial, replenishment, sale_or_shrink, flat]
      - name: avg_daily_units_sold
        description: "Average daily units sold for this product, used for days-of-cover calculation."
        data_type: double
        data_tests:
          - not_null
      - name: days_of_cover
        description: "Estimated days until stockout based on average daily sales."
        data_type: double

  - name: mart_web_analytics
    description: >
      Web analytics mart aggregated at the (session_date, traffic_category,
      device_category) grain. Reports sessions, conversions, bounce rate, and
      average session duration. Powers web performance dashboards.
    meta:
      freshness:
        loaded_at_field: session_date
        warn_after: {count: 1, period: day}
        error_after: {count: 3, period: day}
    columns:
      - name: session_date
        description: "Calendar date of aggregated sessions."
        data_type: date
        data_tests:
          - not_null
      - name: traffic_category
        description: "Classified traffic source."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [paid, organic, email, direct, referral, other]
      - name: device_category
        description: "Device type."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [desktop, mobile, tablet]
      - name: sessions
        description: "Total session count."
        data_type: bigint
        data_tests:
          - not_null
      - name: known_customer_sessions
        description: "Sessions from authenticated (known) customers."
        data_type: bigint
        data_tests:
          - not_null
      - name: conversions
        description: "Sessions that resulted in a purchase."
        data_type: bigint
        data_tests:
          - not_null
      - name: bounced_sessions
        description: "Sessions where page_views <= 1."
        data_type: bigint
        data_tests:
          - not_null
      - name: conversion_rate
        description: "Conversions / sessions (0–1)."
        data_type: double
      - name: bounce_rate
        description: "Bounced sessions / sessions (0–1)."
        data_type: double
      - name: avg_session_duration_sec
        description: "Average session length in seconds."
        data_type: double

  - name: mart_customer_360
    description: >
      Customer 360 view combining purchase history, loyalty data, and web session
      behavior. One row per customer. Includes RFM recency, segment classification,
      and a deterministic surrogate key.
    meta:
      freshness:
        loaded_at_field: last_order_date
        warn_after: {count: 1, period: day}
        error_after: {count: 3, period: day}
    columns:
      - name: customer_sk
        description: "MD5 surrogate key derived from customer_id."
        data_type: varchar
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Source customer identifier."
        data_type: varchar
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: "Customer first name (trimmed)."
        data_type: varchar
        data_tests:
          - not_null
      - name: last_name
        description: "Customer last name (trimmed)."
        data_type: varchar
        data_tests:
          - not_null
      - name: email
        description: "Normalized customer email."
        data_type: varchar
        data_tests:
          - not_null
      - name: signup_date
        description: "Date the customer created their account."
        data_type: date
        data_tests:
          - not_null
      - name: country
        description: "ISO 3166-1 alpha-2 country code (uppercase)."
        data_type: varchar
        data_tests:
          - not_null
      - name: loyalty_tier
        description: "Customer loyalty tier."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [bronze, silver, gold, platinum]
      - name: orders_count
        description: "Total orders placed."
        data_type: bigint
        data_tests:
          - not_null
      - name: lifetime_net_revenue
        description: "Cumulative net revenue from this customer."
        data_type: double
        data_tests:
          - not_null
      - name: total_units_purchased
        description: "Total units purchased across all orders."
        data_type: bigint
        data_tests:
          - not_null
      - name: first_order_date
        description: "Date of the customer's first order."
        data_type: date
      - name: last_order_date
        description: "Date of the customer's most recent order."
        data_type: date
      - name: avg_order_value
        description: "Average net order value (null for customers with zero orders)."
        data_type: double
      - name: total_sessions
        description: "Total web sessions attributed to this customer."
        data_type: bigint
        data_tests:
          - not_null
      - name: last_session_date
        description: "Date of the customer's most recent web session."
        data_type: date
      - name: top_traffic_category
        description: "Most frequent traffic source category across all sessions."
        data_type: varchar
      - name: rfm_recency_days
        description: "Days since last order (null for customers who have never ordered)."
        data_type: integer
      - name: segment
        description: "Customer segment classification."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [vip, loyal, regular, at_risk, new]
