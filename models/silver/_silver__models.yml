version: 2

models:
  - name: int_sales_enriched
    description: >
      Enriched sales transactions joined with product and customer dimensions.
      Computes net_amount_dollars, gross_margin_dollars, and fiscal_quarter.
      Materialized as incremental using delete+insert on order_id.
    config:
      materialized: incremental
    columns:
      - name: sales_sk
        description: "MD5 surrogate key derived from order_id."
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: "Source order identifier."
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Customer who placed the order."
        data_tests:
          - not_null
      - name: product_id
        description: "Product ordered."
        data_tests:
          - not_null
      - name: order_ts
        description: "Order timestamp (UTC)."
        data_tests:
          - not_null
      - name: order_date
        description: "Calendar date of the order."
        data_tests:
          - not_null
      - name: quantity
        description: "Units ordered."
        data_tests:
          - not_null
      - name: unit_price_dollars
        description: "Listed unit price in USD."
        data_tests:
          - not_null
      - name: discount_dollars
        description: "Total discount applied in USD."
      - name: gross_amount_dollars
        description: "Total pre-discount order value (quantity × unit_price_dollars)."
        data_tests:
          - not_null
      - name: net_amount_dollars
        description: "Order revenue after discount (gross_amount - discount)."
        data_tests:
          - not_null
      - name: gross_margin_dollars
        description: "Net revenue minus total product cost."
      - name: channel
        description: "Sales channel (web, mobile, store)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [web, mobile, store]
      - name: store_id
        description: "Store identifier."
        data_tests:
          - not_null
      - name: category
        description: "Product category."
      - name: subcategory
        description: "Product subcategory."
      - name: cost_dollars
        description: "Unit cost at time of sale."
      - name: loyalty_tier
        description: "Customer loyalty tier at time of order."
      - name: country
        description: "Customer country."
      - name: fiscal_quarter
        description: "Fiscal quarter label (e.g., FY2025-Q2) based on February fiscal year start."
        data_tests:
          - not_null

  - name: int_customer_orders
    description: >
      Customer-grain aggregation combining stg_customers with order history
      from int_sales_enriched. Includes lifetime revenue, order count, and
      first/last order dates. Customers with no orders are retained via left join.
    columns:
      - name: customer_id
        description: "Unique customer identifier."
        data_tests:
          - unique
          - not_null
      - name: email
        description: "Normalized customer email."
        data_tests:
          - not_null
      - name: loyalty_tier
        description: "Customer loyalty tier."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [bronze, silver, gold, platinum]
      - name: orders_count
        description: "Total number of distinct orders placed by the customer."
        data_tests:
          - not_null
      - name: lifetime_net_revenue
        description: "Sum of net_amount_dollars across all orders."
        data_tests:
          - not_null
      - name: total_units_purchased
        description: "Total units purchased across all orders."
        data_tests:
          - not_null
      - name: first_order_date
        description: "Date of the customer's first order."
      - name: last_order_date
        description: "Date of the customer's most recent order."
      - name: avg_order_value
        description: "Average net order value (null for customers with zero orders)."

  - name: int_inventory_movements
    description: >
      Inventory snapshot data enriched with movement direction using LAG window
      functions. Tracks unit changes period over period per store and product.
      Surrogate key is derived from snapshot_date, store_id, and product_id.
    columns:
      - name: inventory_sk
        description: "MD5 surrogate key from (snapshot_date, store_id, product_id)."
        data_tests:
          - unique
          - not_null
      - name: snapshot_date
        description: "Date of the inventory snapshot."
        data_tests:
          - not_null
      - name: store_id
        description: "Store location."
        data_tests:
          - not_null
      - name: product_id
        description: "Product being tracked."
        data_tests:
          - not_null
      - name: on_hand_units
        description: "Units in stock at snapshot date."
        data_tests:
          - not_null
      - name: reorder_point
        description: "Level at which reorder should be triggered."
        data_tests:
          - not_null
      - name: safety_stock
        description: "Minimum buffer stock."
        data_tests:
          - not_null
      - name: is_below_reorder
        description: "True when on_hand_units < reorder_point."
        data_tests:
          - not_null
      - name: unit_delta
        description: "Change in on_hand_units since the prior snapshot (0 for first record)."
        data_tests:
          - not_null
      - name: movement_type
        description: "Classification of inventory change direction."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [initial, replenishment, sale_or_shrink, flat]

  - name: int_ga_sessions_cleaned
    description: >
      Cleaned and enriched GA session data. Adds traffic_category classification,
      bounce flag, session duration bucket, and known-customer indicator.
    columns:
      - name: session_id
        description: "Unique session identifier."
        data_tests:
          - unique
          - not_null
      - name: session_date
        description: "Calendar date of the session."
        data_tests:
          - not_null
      - name: is_known_customer
        description: "True when customer_id is present (authenticated session)."
        data_tests:
          - not_null
      - name: is_bounced
        description: "True when page_views <= 1."
        data_tests:
          - not_null
      - name: session_duration_bucket
        description: "Bucketed session length (under_1m, 1_to_5m, over_5m)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [under_1m, 1_to_5m, over_5m]
      - name: traffic_category
        description: "Classified traffic source (paid, organic, email, direct, referral, other)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [paid, organic, email, direct, referral, other]
      - name: converted
        description: "True if the session resulted in a purchase."
        data_tests:
          - not_null

  - name: int_product_dimensions
    description: >
      Ephemeral product lookup enriched with price_tier bucket and margin_dollars.
      Used as an inline CTE in gold mart models; never persisted to the warehouse.
    config:
      materialized: ephemeral
    columns:
      - name: product_id
        description: "Unique product identifier."
      - name: category
        description: "Product category."
      - name: subcategory
        description: "Product subcategory."
      - name: list_price_dollars
        description: "Retail price in USD."
      - name: cost_dollars
        description: "Unit cost in USD."
      - name: margin_dollars
        description: "Gross margin per unit (list_price - cost)."
      - name: price_tier
        description: "Price bucket: low (<$25), mid ($25-$99), high (>=$100)."
      - name: is_active
        description: "True if the product is currently available."
